<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Winchu</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea, #764ba2, #f093fb, #f5576c, #4facfe);
            background-size: 400% 400%;
            animation: grad 15s ease infinite;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        @keyframes grad {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 40px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: white;
            font-size: 48px;
            margin-bottom: 10px;
        }
        p {
            color: rgba(255,255,255,0.8);
            font-size: 16px;
            margin-bottom: 20px;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            background: #0f172a;
            color: white;
            margin: 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }
        .btn-secondary:hover {
            background: rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚡️ Winchu</h1>
        <p>Shape your presence. Manifest your energy.</p>
        <button onclick="alert('Coming soon!')">Sign In</button>
        <button class="btn-secondary" onclick="alert('Coming soon!')">Create Account</button>
        <p style="margin-top:20px;font-size:12px;opacity:0.5;">✨ Connected to JSONBin</p>
    </div>

    <script>
        console.log('⚡️ Winchu is ready!');
        console.log('📍 Visit the full app at the main page.');
    </script>
</body>
</html>
