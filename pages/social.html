<div class="page" id="page-social">
    <div class="container" style="padding: 16px 14px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
            <h2 style="font-size:20px;font-weight:700;">Winchu</h2>
            <div style="display:flex;gap:12px;align-items:center;">
                <button class="btn-sm" onclick="window.navigate('wallpapers')" style="font-size:16px;background:none;border:none;padding:4px;">🎨</button>
                <button class="btn-sm" onclick="document.getElementById('postInput').focus()" style="font-size:16px;background:none;border:none;padding:4px;">➕</button>
            </div>
        </div>
        <div class="ig-story-row" id="storyRow"></div>
        <div style="background:rgba(255,255,255,0.5);border-radius:12px;padding:10px 12px;margin-bottom:14px;border:1px solid rgba(0,0,0,0.04);">
            <div style="display:flex;align-items:center;gap:10px;">
                <div class="ig-post-avatar" style="width:32px;height:32px;font-size:16px;flex-shrink:0;">
                    <span id="postAvatarEmoji">😊</span>
                </div>
                <input type="text" id="postInput" placeholder="What's on your mind?" style="flex:1;border:none;background:transparent;padding:6px 0;font-size:13px;outline:none;">
                <div class="file-input-wrapper">
                    <button class="btn-sm" style="font-size:16px;background:none;border:none;padding:4px;cursor:pointer;">📎</button>
                    <input type="file" id="postFile" accept="image/*,video/*" onchange="window.handleFileSelect(event)">
                </div>
                <button class="btn-sm btn-primary" onclick="window.createPost()" style="width:auto;padding:6px 14px;font-size:12px;">Post</button>
            </div>
            <div id="filePreview" style="margin-top:4px;display:none;"></div>
        </div>
        <div id="socialFeed" style="max-height:520px;overflow-y:auto;padding-bottom:10px;">
            <p style="color:#94a3b8;text-align:center;padding:30px 0;">No posts yet. Share something!</p>
        </div>
    </div>
</div>
