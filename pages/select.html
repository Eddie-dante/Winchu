<!-- pages/select.html -->
<div class="page" id="page-select">
    <div class="container">
        <h2 style="font-size:19px;font-weight:700;margin-bottom:3px;">Choose Your Auras</h2>
        <p style="color:#64748b;font-size:12px;margin-bottom:10px;">Select up to 3 energies</p>
        <div class="counter-chip"><span>✧</span> <strong id="counter">0</strong><span>/3</span></div>
        <div class="aura-grid" id="auraGrid"></div>
        <button class="btn-primary" onclick="window.confirmSelection()" style="margin-top:10px;">Continue →</button>
    </div>
</div>

<script>
function renderAuraGrid() {
    const grid = document.getElementById('auraGrid');
    if (!grid) return;
    grid.innerHTML = Object.entries(AURAS).map(([key, aura]) => {
        const sel = S.selectedAuras.includes(key);
        return `<div class="aura-btn${sel ? ' selected' : ''}" onclick="window.toggleAura('${key}')">
            <span class="emoji">${aura.emoji}</span>
            <div class="info"><h3>${aura.name}</h3><p>${aura.desc}</p></div>
            <span class="check-mark">✓</span>
        </div>`;
    }).join('');
    document.getElementById('counter').textContent = S.selectedAuras.length;
}

function toggleAura(key) {
    const idx = S.selectedAuras.indexOf(key);
    if (idx > -1) S.selectedAuras.splice(idx, 1);
    else if (S.selectedAuras.length < 3) S.selectedAuras.push(key);
    renderAuraGrid();
}

function confirmSelection() {
    if (S.selectedAuras.length === 0) { toast('Select at least one aura'); return; }
    if (S.username) {
        setData(`users/${S.username}/selected_auras`, S.selectedAuras);
    }
    navigate('social');
    toast('Auras activated! ✨');
}

window.renderAuraGrid = renderAuraGrid;
window.toggleAura = toggleAura;
window.confirmSelection = confirmSelection;
</script>
