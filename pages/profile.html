<div class="page" id="page-profile">
    <div class="container">
        <div class="profile-header">
            <div class="profile-avatar-large" id="profileAvatarContainer">
                <div class="inner" id="profileAvatarEmoji">😊</div>
            </div>
            <div class="profile-name" id="profileName">—</div>
            <div class="profile-username" id="profileUsername">@—</div>
            <div class="profile-stats">
                <div class="profile-stat"><div class="num" id="profilePosts">0</div><div class="label">Posts</div></div>
                <div class="profile-stat"><div class="num" id="profileFollowers">0</div><div class="label">Followers</div></div>
                <div class="profile-stat"><div class="num" id="profileFollowing">0</div><div class="label">Following</div></div>
            </div>
            <div class="profile-bio" id="profileBio">Building my energy. One aura at a time. ⚡️</div>
            <div style="display:flex;gap:8px;margin:6px 0;flex-wrap:wrap;justify-content:center;">
                <button class="profile-edit-btn" onclick="window.editProfile()">✏️ Edit Bio</button>
                <button class="profile-edit-btn" onclick="document.getElementById('profileAvatarInput').click()">📷 Change Avatar</button>
                <input type="file" id="profileAvatarInput" accept="image/*" style="display:none;" onchange="window.handleAvatarSelect(event)">
            </div>
            <button class="profile-edit-btn" onclick="window.logout()" style="margin-top:6px;color:#ef4444;border-color:#ef4444;">🚪 Logout</button>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:12px;">
            <button class="btn-sm" style="flex:1;background:rgba(0,0,0,0.05);" onclick="window.navigate('home')">📊 Dashboard</button>
            <button class="btn-sm" style="flex:1;background:rgba(0,0,0,0.05);" onclick="window.navigate('select')">✧ Auras</button>
        </div>
        <h3 style="font-size:14px;font-weight:600;margin-bottom:8px;">📸 Your Posts</h3>
        <div id="profilePostsGrid" style="display:grid;grid-template-columns:repeat(3,1fr);gap:4px;">
            <p style="color:#94a3b8;text-align:center;grid-column:1/-1;padding:16px 0;">No posts yet.</p>
        </div>
    </div>
</div>
