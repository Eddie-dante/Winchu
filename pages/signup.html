<div class="page" id="page-signup">
    <div class="container">
        <h2 style="font-size:19px;font-weight:700;margin-bottom:16px;">✨ Create Account</h2>
        <input type="text" id="signupName" placeholder="Full name" style="margin-bottom:8px;">
        <input type="text" id="signupUser" placeholder="Username" style="margin-bottom:8px;">
        <input type="password" id="signupPass" placeholder="Password" style="margin-bottom:16px;">
        <button class="btn-primary" onclick="window.handleSignup()">Sign Up</button>
        <div class="auth-toggle" onclick="window.navigate('login')">Already have an account? Log in</div>
        <button class="btn-secondary" onclick="window.navigate('landing')" style="margin-top:8px;">← Back</button>
    </div>
</div>
