<div class="page" id="page-chat">
    <div class="container">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
            <h2 style="font-size:19px;font-weight:700;">💬 Chat</h2>
            <span style="font-size:11px;color:#4ade80;">● <span id="onlineCount">0</span></span>
        </div>
        <div style="font-size:11px;color:#64748b;margin-bottom:6px;">
            You: <strong id="myUsername">—</strong>
            <button class="btn-sm" onclick="window.changeUsername()" style="margin-left:6px;font-size:10px;">✏️</button>
        </div>
        
        <!-- Chat List (Friends, Groups, Public) -->
        <div id="chatList" style="margin-bottom:8px;max-height:100px;overflow-y:auto;background:rgba(0,0,0,0.03);border-radius:10px;padding:6px;">
            <div id="friendsListContainer" style="padding:4px;">
                <span style="font-size:11px;color:#94a3b8;">Loading chats...</span>
            </div>
        </div>

        <!-- Chat Messages -->
        <div id="chatHeader" style="font-size:12px;font-weight:600;color:#0f172a;padding:4px 0;">💬 Public Chat</div>
        <div class="chat-messages" id="chatMessages">
            <p style="color:#94a3b8;text-align:center;padding:16px;">No messages yet.</p>
        </div>
        
        <div style="display:flex;gap:6px;">
            <input type="text" id="chatInput" placeholder="Message..." onkeypress="if(event.key==='Enter')window.sendMessage()" style="flex:1;">
            <button class="btn-sm btn-primary" onclick="window.sendMessage()" style="width:auto;">📤</button>
        </div>
    </div>
</div>
