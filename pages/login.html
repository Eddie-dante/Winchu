<div class="page" id="page-login">
    <div class="container">
        <h2 style="font-size:19px;font-weight:700;margin-bottom:16px;">🔐 Sign In</h2>
        <input type="text" id="loginUser" placeholder="Username" style="margin-bottom:8px;">
        <input type="password" id="loginPass" placeholder="Password" style="margin-bottom:16px;">
        <button class="btn-primary" onclick="window.handleLogin()">Log In</button>
        <div class="auth-toggle" onclick="window.navigate('signup')">No account? Create one</div>
        <button class="btn-secondary" onclick="window.navigate('landing')" style="margin-top:8px;">← Back</button>
    </div>
</div>
